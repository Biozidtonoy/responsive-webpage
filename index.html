<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Subscribe</title>
</head>
<body>
    <header class="header">
        <div class="leftSideHeader">
            <div class="logo">
                <img src="/responsive-webpage/image/logo.png" alt="company logo">
            </div>
            <div class="companyName">Subscribe</div>
        </div>

        <button  class="menu-toggle" aria-label="Toggle menu"><span class="mdi mdi-menu"></span></button>

        <div class="rightSideHeader">
            <nav class="navbar" aria-label="Main navigation">
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Features</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
                <button class="signInbtn" aria-label="Sign in your account" >Sign In</button>
            </nav>
        </div>
    </header>
    <main>
        <section class="hero">
            <h1 class="titleText">
                Your story starts <br>
                <span class="t2">with better data</span>
            </h1>
            <div class="description">
                <h2>Every great business begins with a decision. A moment where insight becomes action.</h2>
            </div>
            <div class="cta-btn">
                <button class="start-btn" aria-label="Start your journey click here">Strat your journey</button>
                <button class="story-btn" aria-label="watch the story unfold click here">Watch the story unfold</button>
            </div>
        </section>
    </main>


    <script src="script.js"></script>
</body>
</html>
